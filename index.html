<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 助盲红绿灯识别</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: sans-serif;
            overflow: hidden; /* 防止页面滚动 */
        }
        /* 摄像头画面铺满底层 */
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover;
            z-index: 1;
        }
        /* 顶部状态栏：高对比度，方便视障人士余光感知 */
        #info-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 0;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            z-index: 10;
            transition: background-color 0.3s;
        }
        /* 全屏启动遮罩层（解决手机浏览器语音权限问题） */
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        .start-btn {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .hint-text {
            color: #ecf0f1;
            font-size: 18px;
            text-align: center;
            padding: 0 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="startApp()">点击启动<br>辅助系统</button>
        <div class="hint-text">系统需要调用后置摄像头<br>点击后将激活语音播报功能</div>
    </div>

    <div id="info-bar">等待启动...</div>

    <script src="sketch.js"></script>
</body>
</html>
